spring.application.name=campus
# 1. Database Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin@1205
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate / JPA Configuration (The Magic Part)
# 'update' automatically updates the schema or creates missing tables
spring.jpa.hibernate.ddl-auto=update

# 3. Optional SQL Console Logging (Helps with debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect